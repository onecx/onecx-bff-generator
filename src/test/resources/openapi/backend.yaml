openapi: 3.0.3
info:
  title: Backend API
  version: 1.0.0
paths:
  /internal/users:
    get:
      operationId: getUsers
      tags:
        - Users
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserInternal'
    post:
      operationId: createUser
      tags:
        - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInternal'
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInternal'
  /internal/users/{id}:
    get:
      operationId: getUserById
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInternal'
    delete:
      operationId: deleteUser
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: deleted
components:
  schemas:
    UserInternal:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string


